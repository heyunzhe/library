<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登陆界面</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div class="fbox">

        <div class="logo">
            <img src="../images/logo.png" alt="">
        </div>
        <div class="box">
            <form id="loginForm" method="post" action="/login" onsubmit="return login(event)">
                <p class="login" id="login">登录界面</p>
                <div class="box1">
                    帐号：<input type="text" id="username" placeholder="读者号" name="username" required>
                </div>
                <br>
                <div class="box2">
                    密码：<input type="password" id="password" placeholder="密码" name="password" required>
                </div>
                <br><br>
                <div class="box3">
                    <button type="submit" id="loginButton">登录</button>
                </div>
            </form>
            <form id="registerForm" class="hidden">
                <p class="register" id="login">注册界面</p>
                <div class="box1">
                    帐号：<input type="text" name="username" placeholder="读者号" required>
                </div><br>
                <div class="box2">
                    密码：<input type="password" name="password" placeholder="密码" required>
                </div><br>
                <div class="box2">
                    确认：<input type="password" name="password2" placeholder="确认密码" required>
                </div><br>
                <div class="box3">
                    <button type="submit">注册</button>
                </div>
            </form>
            <div class="box4">
                <button id="toggleForm" class="toggle-btn">切换到注册</button>
            </div>
    
        </div>
    </div>

    <script src="../js/login.js"></script>

</body>
</html>
