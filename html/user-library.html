<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心</title>
    <link rel="stylesheet" href="/css/user-library.css">

</head>
<body>
    <header class="header">
        <h1>个人中心</h1>
        <div class="user-info">
            <img src="" alt="用户头像" class="user-avatar">
            <div>
                <h2 id="user_name"></h2>
                <p>学生卡号: <span id="student_id"></span></p>
            </div>
        </div>
    </header>

    <button id="editButton">编辑个人信息</button>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <h2>编辑个人信息</h2>
            <form id="editForm">
                <label for="edit_name">姓名：</label>
                <input type="text" id="edit_name" name="name" required><br><br>
                
                <label for="edit_age">年龄：</label>
                <input type="number" id="edit_age" name="age" required><br><br>
                
                <label for="edit_birthday">生日：</label>
                <input type="date" id="edit_birthday" name="birthday" required><br><br>
                
                <label for="edit_photo">头像：</label>
                <input type="file" id="edit_photo" name="photo" accept="image/*"><br><br>
                
                <div id="passwordFields" style="display: none;">
                    <label for="edit_password">当前密码：</label>
                    <input type="password" id="edit_password" name="password"><br><br>
                    
                    <label for="edit_newpassword">新密码：</label>
                    <input type="password" id="edit_newpassword" name="newpassword"><br><br>
                </div>
                
                <button type="submit">确认</button>
                <button type="button" id="changePasswordBtn">修改密码</button>
            </form>
        </div>
    </div>

    <section class="stats">
        <div class="stat-card">
            <h3>借阅统计</h3>
            <p>当前借阅: <span id="current_borrow"></span></p>
            <p>历史借阅: <span id="history_borrow"></span></p>
        </div>
        <div class="stat-card">
            <h3>借阅限额</h3>
            <p>已借阅: <span id="borrow_limit"></span></p>
        </div>
    </section>

    <section class="book-list">
        <h2>当前借阅</h2>
        <table>
            <thead>
                <tr>
                    <th>书名</th>
                    <th>ISBN</th>
                    <th>借阅日期</th>
                    <th>应还日期</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="current_borrow_list">
                <!-- 当前借阅列表将通过JavaScript动态加载 -->
            </tbody>
        </table>
    </section>

    <section class="book-list">
        <h2>借阅历史</h2>
        <table>
            <thead>
                <tr>
                    <th>书名</th>
                    <th>ISBN</th>
                    <th>借阅日期</th>
                    <th>归还日期</th>
                    <th>逾期费用</th>
                </tr>
            </thead>
            <tbody id="borrow_history_list">
                <!-- 借阅历史列表将通过JavaScript动态加载 -->
            </tbody>
        </table>
    </section>

    <!-- 模态窗口 -->
<div id="model2" class="modal1" tabindex="-1" role="dialog">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">归还书籍</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <form id="returnForm" method="post" action="/return/book">
                    <div class="form-group">
                        <label for="cardKey">请输入卡密</label>
                        <input type="text" class="form-control" id="cardKey" name="money-key" placeholder="卡密">
                    </div>
                        <input type="hidden" id="bookISBN" name="isbn">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" id="submitReturn">提交</button>
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">取消</button>
                </div>
            </form>
        </div>
    </div>
</div>


    <script src="/js/user-library.js"></script>
</body>
</html>
