<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书管理</title>
    <link rel="stylesheet" href="/css/view-book.css">
</head>
<body>
    <nav class="top-nav">
        <div class="nav-inner">
            <a href="/admin" class="nav-brand">📚 后台</a>
            <div class="nav-links">
                <a href="/admin">首页</a>
                <a href="/view/book" class="active">图书</a>
                <a href="/add/book">添加</a>
                <a href="/view/user">用户</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>📚 图书管理</h1>
        </div>

        <div class="search-section">
            <form id="searchForm">
            <select id="searchCategory">
                <option value="1">关键词</option>
                <option value="2">书名</option>
                <option value="3">作者</option>
                <option value="4">ISBN</option>
            </select>
            <input type="text" id="searchInput" placeholder="输入搜索内容...">
            <button type="submit">搜索</button>
            </form>
        </div>

        <div class="table-wrapper">
            <table id="bookTable">
                <thead>
                    <tr>
                        <th>封面</th>
                        <th>书名</th>
                        <th>作者</th>
                        <th>ISBN</th>
                        <th>出版社</th>
                        <th>可借</th>
                        <th>推荐</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="bookList"></tbody>
            </table>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div id="detailModal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h2>📖 图书详情</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="detailContent"></div>
        </div>
    </div>

    <!-- 编辑弹窗 -->
    <div id="editModal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h2>✏️ 编辑图书</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <form id="editForm">
                    <input type="hidden" id="yisbn" name="yisbn">

                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label for="title">书名<span class="required">*</span></label>
                            <input type="text" id="title" name="title" required>
                        </div>
                        <div class="form-group flex-1">
                            <label for="isbn">ISBN<span class="required">*</span></label>
                            <input type="text" id="isbn" name="isbn" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="author">作者</label>
                        <input type="text" id="author" name="author">
                    </div>

                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label for="press">出版社</label>
                            <input type="text" id="press" name="press">
                        </div>
                        <div class="form-group flex-1">
                            <label for="press_date">出版日期</label>
                            <input type="date" id="press_date" name="press_date">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="book_type">图书类型</label>
                        <input type="text" id="book_type" name="book_type">
                    </div>

                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label for="price">价格</label>
                            <input type="number" id="price" name="price" step="0.01">
                        </div>
                        <div class="form-group flex-1">
                            <label for="amount">总数量</label>
                            <input type="number" id="amount" name="amount">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label for="lend_amount">可借数量</label>
                            <input type="number" id="lend_amount" name="lend_amount">
                        </div>
                        <div class="form-group flex-1">
                            <label for="cur_lend_amount">当前可借</label>
                            <input type="number" id="cur_lend_amount" name="cur_lend_amount">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="intro">简介</label>
                        <textarea id="intro" name="intro"></textarea>
                    </div>

                    <div class="switch-group">
                        <label for="rec_state">是否推荐图书</label>
                        <label class="switch">
                            <input type="checkbox" id="rec_state" name="rec_state" value="1">
                            <span class="slider"></span>
                        </label>
                    </div>

                    <div class="form-group" id="recTypeContainer" style="display: none;">
                        <label for="rec_type">推荐类型</label>
                        <input type="text" id="rec_type" name="rec_type" placeholder="如：文学经典、新书推荐">
                    </div>

                    <div class="form-divider"></div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary modal-close">取消</button>
                        <button type="button" class="btn btn-primary" id="saveChanges">保存更改</button>
                        <button type="button" class="btn" style="background: #ef4444; color: #fff;" id="deleteBook">删除图书</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/view-book.js"></script>
</body>
