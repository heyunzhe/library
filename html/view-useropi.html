<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户意见管理</title>
    <link rel="stylesheet" href="/css/view-useropi.css">
    <style>
        td {
            max-width: 150px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.4);
        }

        .modal-content {
            background-color: #fff;
            margin: 10% auto;
            padding: 20px;
            width: 50%;
            border-radius: 8px;
        }

        .close, .close-view {
            float: right;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>用户意见管理</h1>

        <form id="searchForm">
            <input type="text" id="searchId" name="opinion_id" placeholder="输入ID查询">  
            <button>查询</button>  
        </form>

        <table id="opinionsTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>姓名</th>
                    <th>电话</th>
                    <th>邮箱</th>
                    <th>意见</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="opinionsList"></tbody>
        </table>
    </div>

    <!-- 回复弹窗 -->
    <div id="replyModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>回复用户意见</h2>
            <form id="replyForm">
                <input type="hidden" id="replay_user" name="replay_user">

                <div>
                    <label>回复单位：</label>
                    <input type="text" id="replay_name" name="replay_name" required>
                </div>

                <div>
                    <label>回复日期：</label>
                    <input type="date" id="replay_date" name="replay_date" required>
                </div>

                <div>
                    <label>回复内容：</label>
                    <textarea id="replay_idea" name="replay_idea" required></textarea>
                </div>

                <button type="submit">提交回复</button>
            </form>
        </div>
    </div>

    <!-- 查看详情弹窗 -->
    <div id="viewModal" class="modal">
        <div class="modal-content">
            <span class="close-view">&times;</span>
            <h3>用户意见详情</h3>
            <p><strong>姓名：</strong><span id="view_name"></span></p>
            <p><strong>电话：</strong><span id="view_phone"></span></p>
            <p><strong>邮箱：</strong><span id="view_email"></span></p>
            <p><strong>意见：</strong></p>
            <div id="view_idea" style="white-space: pre-wrap;"></div>
        </div>
    </div>

    <script src="/js/view-useropi.js"></script>
</body>
</html>
