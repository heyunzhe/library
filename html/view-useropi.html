<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户意见管理</title>
    <link rel="stylesheet" href="../css/view-useropi.css">
</head>
<body>
    <div class="container">
        <h1>用户意见管理</h1>
        <form action="/chaxopi" method="post" id="searchForm">
            <input type="text" id="searchId" name="opinion_id" placeholder="输入ID查询">  
            <button>查询</button>  
        </form>
        <table id="opinionsTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>姓名</th>
                    <th>电话</th>
                    <th>邮箱</th>
                    <th>意见</th>
                    <th>回复</th>
                </tr>
            </thead>
            <tbody id="opinionsList">
                <!-- 用户意见将通过JavaScript动态加载 -->
            </tbody>
        </table>
    </div>

    <div id="replyModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>回复用户意见</h2>
            <form id="replyForm">
                <input type="hidden" id="replay_user" name="replay_user">
                <div class="form-group">
                    <label for="replay_name">回复单位：</label>
                    <input type="text" id="replay_name" name="replay_name" required>
                </div>
                <div class="form-group">
                    <label for="replay_date">回复日期：</label>
                    <input type="date" id="replay_date" name="replay_date" required>
                </div>
                <div class="form-group">
                    <label for="replay_idea">回复内容：</label>
                    <textarea id="replay_idea" name="replay_idea" required></textarea>
                </div>
                <button type="submit">提交回复</button>
            </form>
        </div>
    </div>

    <script src="../js/view-useropi.js"></script>
    
</body>
</html>
