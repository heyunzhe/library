<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>线上借阅</title>
    <link rel="stylesheet" href="/css/lend-book-list.css">
</head>
<body>
    <!-- 顶部导航 -->
    <div class="top-bar">
        <div class="top-inner">
            <div class="logo">
                <a href="/index"><img src="/images/logo.png" alt=""></a>
            </div>
            <div class="search-area">
                <form action="/search/book" method="get" id="searchForm">
                    <select name="selsearch">
                        <option value="1">任意词</option>
                        <option value="2">书名</option>
                        <option value="3">作者</option>
                        <option value="4">ISBN</option>
                    </select>
                    <input type="text" name="inpsearch" placeholder="搜索图书...">
                    <button type="submit">搜索</button>
                </form>
            </div>
            <div class="top-links">
                <a href="/index">首页</a>
                <a href="#" id="myBookshelf">📚 借书架<span id="bookCount">（0）</span></a>
                <a href="/login" id="authButton">登录</a>
            </div>
        </div>
    </div>

    <div class="main-wrap">
        <!-- 筛选侧栏 -->
        <aside class="filter-sidebar">
            <div class="filter-section">
                <div class="filter-title">已选条件</div>
                <div class="filter-tags" id="select"></div>
            </div>
            <div class="filter-section">
                <div class="filter-title">作者</div>
                <div class="filter-links" data-category="value">
                    <a href="#">鲁迅</a><a href="#">老舍</a><a href="#">余华</a><a href="#">莫言</a><a href="#">更多</a>
                </div>
            </div>
            <div class="filter-section">
                <div class="filter-title">出版社</div>
                <div class="filter-links" data-category="value1">
                    <a href="#">人民邮电出版社</a><a href="#">清华大学出版社</a><a href="#">北京大学出版社</a><a href="#">人民出版社</a><a href="#">更多</a>
                </div>
            </div>
            <div class="filter-section">
                <div class="filter-title">类型</div>
                <div class="filter-links" data-category="value2">
                    <a href="#">文学类</a><a href="#">科幻类</a><a href="#">艺术类</a><a href="#">历史类</a><a href="#">更多</a>
                </div>
            </div>
            <div class="filter-section">
                <div class="filter-title">出版年份</div>
                <div class="filter-links" data-category="value3">
                    <a href="#">2024</a><a href="#">2023</a><a href="#">2022</a><a href="#">2021</a><a href="#">2020</a>
                </div>
            </div>
            <div class="filter-section">
                <div class="filter-title">推荐图书</div>
                <div class="filter-links" data-category="value4">
                    <a href="#">推荐</a>
                </div>
            </div>
        </aside>

        <!-- 图书列表 -->
        <section class="book-list">
            <div class="list-header">
                <span class="list-count" id="resultCount">共 0 本</span>
                <span class="refresh-status" id="refreshStatus">● 实时</span>
            </div>
            <div class="book-grid" id="bookContainer">
                <!-- JS动态渲染 -->
            </div>
            <div class="pagination" id="pagination"></div>
        </section>
    </div>

    <!-- 借书架弹窗 -->
    <div id="bookshelfModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>📚 我的借书架</h2>
            <div id="borrowedBooks"></div>
        </div>
    </div>

    <!-- 图书详情弹窗 -->
    <div id="bookDetailModal" class="modal">
        <div class="modal-content" style="max-width:640px">
            <span class="close" id="closeDetail">&times;</span>
            <div id="bookDetailBody"></div>
        </div>
    </div>

    <script src="/js/lend-book-list.js"></script>
    <script src="/js/change-page.js"></script>
</body>
</html>
